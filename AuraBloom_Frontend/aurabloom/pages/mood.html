<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBloom | Mood Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; transition: background 0.5s ease; }
        .dark body { background: #020617; }
        .aura-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.1), transparent 50%); z-index: -1; }
        .glass-morph { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 2rem; }
        .dark .glass-morph { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .dashboard-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 pb-32">
<div class="aura-bg"></div>

<div class="max-w-[1600px] mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-lg">
                <span class="text-3xl">🌸</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter dark:text-white">AuraBloom</h1>
        </div>
        <div class="flex items-center gap-3 glass-morph p-2 pr-6">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm transition hover:scale-110">
                <span id="theme-icon">🌙</span>
            </button>
            <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Status</p>
                <p class="text-sm font-extrabold text-emerald-500">Mood Center</p>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">

        <div class="col-span-12 lg:col-span-4 space-y-6">
            <div class="glass-morph p-8">
                <h3 class="font-black text-xl mb-6 dark:text-white">Log Your Aura</h3>
                <input type="hidden" id="mood-id">

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Select Mood</label>
                        <select id="moodType" class="w-full mt-2 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white border-none outline-none ring-2 ring-transparent focus:ring-purple-400 transition">
                            <option value="HAPPY">😊 Happy</option>
                            <option value="CALM">🌊 Calm</option>
                            <option value="STRESSED">😫 Stressed</option>
                            <option value="SAD">😢 Sad</option>
                            <option value="ANXIOUS">😰 Anxious</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Date</label>
                        <input type="date" id="createdDate"
                               class="w-full mt-2 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white border-none outline-none ring-2 ring-transparent focus:ring-purple-400 transition">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Notes</label>
                        <textarea id="note" class="w-full mt-2 p-4 h-24 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white border-none outline-none ring-2 ring-transparent focus:ring-purple-400 transition" placeholder="How are you feeling?"></textarea>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="saveMood()" id="btn-save" class="flex-1 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl font-black shadow-lg hover:scale-105 transition">Save Mood</button>
                        <button onclick="resetForm()" class="px-4 py-4 bg-slate-200 dark:bg-slate-700 rounded-2xl">🔄</button>
                    </div>

                    <div id="edit-actions" class="hidden flex gap-2">
                        <button onclick="updateMood()" class="flex-1 py-4 bg-blue-500 text-white rounded-2xl font-black shadow-lg hover:scale-105 transition">Update</button>
                        <button onclick="deleteMood()" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black shadow-lg hover:scale-105 transition">Delete</button>
                    </div>
                </div>
            </div>

            <div class="glass-morph p-8 border-l-8 border-purple-500">
                <h3 class="font-bold text-slate-500 text-xs uppercase tracking-widest">Emotional Risk Score</h3>
                <div class="flex justify-between items-end mt-2">
                    <p id="risk-text" class="text-3xl font-black dark:text-white">0%</p>
                    <p class="text-[10px] font-bold text-slate-400 pb-1">LAST 30 DAYS</p>
                </div>
                <div class="mt-4 h-3 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                    <div id="risk-bar" class="h-full bg-gradient-to-r from-emerald-400 to-red-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-8 space-y-6">
            <div class="glass-morph p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xl dark:text-white">Vibe Analytics</h3>
                    <div class="flex gap-2">
                        <button onclick="loadTrend('weekly')" class="text-[10px] font-bold px-3 py-1 rounded-full bg-purple-100 text-purple-600 dark:bg-purple-900/30">WEEKLY</button>
                        <button onclick="loadTrend('monthly')" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-500 dark:bg-slate-800">MONTHLY</button>
                    </div>
                </div>
                <div class="h-[300px]">
                    <canvas id="moodChart"></canvas>
                </div>
            </div>

            <div class="glass-morph p-8 overflow-hidden">
                <h3 class="font-black text-xl mb-6 dark:text-white">Recent Reflections</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                        <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 dark:border-slate-800">
                            <th class="pb-4">Mood</th>
                            <th class="pb-4">Date</th>
                            <th class="pb-4">Note</th>
                            <th class="pb-4 text-right">Action</th>
                        </tr>
                        </thead>
                        <tbody id="mood-table-body" class="dark:text-slate-300"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-fit">
    <div class="flex items-center gap-4 px-6 py-4 glass-morph shadow-2xl overflow-x-auto no-scrollbar">
        <button onclick="location.href='dashboard.html'" class="text-2xl opacity-50 hover:opacity-100">🏠</button>
        <button onclick="location.href='mood.html'" class="text-2xl scale-125">✍️</button>
        <button onclick="location.href='meditation.html'" class="text-2xl opacity-50">🧘</button>
        <button onclick="location.href='stats.html'" class="text-2xl opacity-50">📈</button>
        <button onclick="location.href='settings.html'" class="text-2xl opacity-50">⚙️</button>
    </div>
</nav>

<script>
    const API_BASE = "http://localhost:8080/api/moods";
    let AUTH_TOKEN = localStorage.getItem('token');
    let moodChart = null;
    let moodCache = {};

    $(document).ready(() => {
        if (!AUTH_TOKEN) {
            window.location.href = "sign-in.html";
            return;
        }

        const today = new Date().toISOString().split('T')[0];
        $('#createdDate').val(today);

        if (
            localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') &&
                window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
            document.documentElement.classList.add('dark');
            $('#theme-icon').text('☀️');
        }

        loadAllMoods();
        loadRiskScore();
        loadTrend('weekly');
    });

    function authHeaders() {
        return {
            Authorization: `Bearer ${AUTH_TOKEN}`
        };
    }

    function loadAllMoods() {
        $.ajax({
            url: API_BASE,
            headers: authHeaders(),
            success: (res) => {
                moodCache = {};
                const rows = (res.data || []).map(m => {
                    moodCache[m.id] = m;
                    return `
            <tr class="border-b border-slate-50 dark:border-slate-800/50 hover:bg-white/50 dark:hover:bg-slate-800/30 transition cursor-pointer">
              <td class="py-4 font-bold">${getEmoji(m.moodType)} ${m.moodType}</td>
              <td class="py-4 text-sm opacity-70">${m.createdDate || '-'}</td>
              <td class="py-4 text-sm opacity-70">${m.note || '-'}</td>
              <td class="py-4 text-right">
                <button class="text-xs font-bold text-purple-500" onclick="editRow(${m.id})">Edit</button>
              </td>
            </tr>
          `;
                }).join('');
                $('#mood-table-body').html(rows || `<tr><td colspan="4" class="py-4 text-center opacity-60">No moods yet</td></tr>`);
            },
            error: function (xhr) {
                if (xhr.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = "sign-in.html";
                }
            }
        });
    }

    function saveMood() {
        const data = {
            moodType: $('#moodType').val(),
            note: $('#note').val().trim(),
            createdDate: $('#createdDate').val() || null
        };

        $.ajax({
            url: API_BASE,
            method: 'POST',
            contentType: 'application/json',
            headers: authHeaders(),
            data: JSON.stringify(data),
            success: () => {
                resetForm();
                loadAllMoods();
                loadRiskScore();
                loadTrend('weekly');
            },
            error: function (xhr) {
                alert(xhr.responseJSON?.message || "Failed to save mood");
                if (xhr.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = "sign-in.html";
                }
            }
        });
    }

    function updateMood() {
        const id = $('#mood-id').val();
        const data = {
            moodType: $('#moodType').val(),
            note: $('#note').val().trim(),
            createdDate: $('#createdDate').val() || null
        };

        $.ajax({
            url: `${API_BASE}/${id}`,
            method: 'PUT',
            contentType: 'application/json',
            headers: authHeaders(),
            data: JSON.stringify(data),
            success: () => {
                resetForm();
                loadAllMoods();
                loadRiskScore();
                loadTrend('weekly');
            },
            error: function (xhr) {
                alert(xhr.responseJSON?.message || "Failed to update mood");
            }
        });
    }

    function deleteMood() {
        const id = $('#mood-id').val();
        if (!confirm("Delete this reflection?")) return;

        $.ajax({
            url: `${API_BASE}/${id}`,
            method: 'DELETE',
            headers: authHeaders(),
            success: () => {
                resetForm();
                loadAllMoods();
                loadRiskScore();
                loadTrend('weekly');
            },
            error: function (xhr) {
                alert(xhr.responseJSON?.message || "Failed to delete mood");
            }
        });
    }

    function editRow(id) {
        const m = moodCache[id];
        if (!m) return;

        $('#mood-id').val(m.id);
        $('#moodType').val(m.moodType);
        $('#note').val(m.note || '');
        $('#createdDate').val(m.createdDate || new Date().toISOString().split('T')[0]);
        $('#btn-save').addClass('hidden');
        $('#edit-actions').removeClass('hidden');
    }

    function resetForm() {
        $('#mood-id').val('');
        $('#moodType').val('HAPPY');
        $('#note').val('');
        $('#createdDate').val(new Date().toISOString().split('T')[0]);
        $('#btn-save').removeClass('hidden');
        $('#edit-actions').addClass('hidden');
    }

    function getEmoji(type) {
        const map = { HAPPY: '😊', CALM: '🌊', STRESSED: '😫', SAD: '😢', ANXIOUS: '😰' };
        return map[type] || '✨';
    }

    function loadRiskScore() {
        $.ajax({
            url: `${API_BASE}/risk`,
            headers: authHeaders(),
            success: (res) => {
                const score = Math.round(res.data || 0);
                $('#risk-text').text(`${score}%`);
                $('#risk-bar').css('width', `${score}%`);
            }
        });
    }

    function loadTrend(type) {
        $.ajax({
            url: `${API_BASE}/trend/${type}`,
            headers: authHeaders(),
            success: (res) => {
                const trendData = res.data?.moodCounts || {};
                renderChart(trendData);
            },
            error: function () {
                renderChart({});
            }
        });
    }

    function renderChart(counts) {
        const labels = Object.keys(counts);
        const data = Object.values(counts);

        if (moodChart) moodChart.destroy();

        const ctx = document.getElementById('moodChart').getContext('2d');
        moodChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Frequency',
                    data: data,
                    backgroundColor: ['#8b5cf6', '#60a5fa', '#f472b6', '#fbbf24', '#34d399'],
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function toggleTheme() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        $('#theme-icon').text(isDark ? '☀️' : '🌙');
    }
</script>
</body>
</html>
