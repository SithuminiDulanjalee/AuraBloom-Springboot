<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraBloom | Levels & Badges</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; transition: background 0.5s ease; }
    .dark body { background: #020617; }
    .aura-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15), transparent 50%); z-index: -1; pointer-events: none; }
    .glass-morph { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 2rem; }
    .dark .glass-morph { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .badge-card { transition: all 0.35s ease; }
    .badge-locked { filter: grayscale(100%); opacity: 0.55; }
    .badge-icon-wrap { box-shadow: inset 0 -4px 10px rgba(0,0,0,0.1); }
    .dark .badge-icon-wrap { box-shadow: inset 0 -4px 10px rgba(0,0,0,0.4); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 lg:p-12 overflow-x-hidden pb-40">
<div class="aura-bg"></div>

<div class="max-w-[1600px] mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
    <div class="flex items-center gap-4">
      <div class="w-24 h-24 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-lg mb-8">
        <span class="text-5xl animate-pulse" style="animation-duration: 3s;">🏆</span>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tighter dark:text-white">AuraBloom <span class="text-emerald-500">Legacy</span></h1>
    </div>

    <div class="flex items-center gap-3 glass-morph p-2 pr-6">
      <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm transition hover:scale-110">
        <span id="theme-icon">🌙</span>
      </button>
      <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
      <div class="text-right">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Rank</p>
        <p class="text-sm font-extrabold text-emerald-500">Aura Master</p>
      </div>
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-xl ml-4" alt="User Profile">
    </div>
  </header>

  <div class="space-y-8">
    <div class="glass-morph p-8 md:p-10 relative overflow-hidden">
      <div class="absolute -right-10 -top-10 text-[15rem] opacity-5 select-none pointer-events-none">⭐</div>

      <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-10">
        <div class="flex items-center gap-6 w-full lg:w-auto">
          <div class="w-28 h-28 rounded-full ring-8 ring-emerald-500/20 bg-white dark:bg-slate-800 flex flex-col items-center justify-center border-4 border-emerald-500 shrink-0">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-1">Level</span>
            <span id="level-number" class="text-5xl font-black text-emerald-500">12</span>
          </div>
          <div>
            <h2 class="text-3xl font-black dark:text-white">Aura Master</h2>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">Top 5% of Mindful Users</p>
          </div>
        </div>

        <div class="w-full lg:flex-1 max-w-2xl">
          <div class="flex justify-between text-sm font-bold mb-3">
            <span class="dark:text-white text-lg"><span id="earned-points">0</span> <span class="text-slate-400 text-sm">AP</span></span>
            <span class="text-slate-400 text-lg">1,000 <span class="text-slate-500 text-sm">AP</span></span>
          </div>
          <div class="h-5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden shadow-inner relative">
            <div id="level-bar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-400 to-emerald-500 rounded-full transition-all duration-1000 ease-out flex items-center justify-end pr-2" style="width: 0%;">
              <div class="w-3 h-3 bg-white/50 rounded-full animate-pulse"></div>
            </div>
          </div>
          <p class="text-right text-xs text-emerald-500 font-bold mt-3 uppercase tracking-widest flex items-center justify-end gap-1">
            <span>✨</span> <span id="points-to-next">0 AP</span> to Level 13
          </p>
        </div>
      </div>
    </div>

    <div class="glass-morph p-8">
      <div class="flex flex-col md:flex-row justify-between items-end md:items-center mb-8 gap-4">
        <div>
          <h2 class="text-2xl font-black dark:text-white leading-tight">Achievement Badges</h2>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Collect badges by completing milestones.</p>
        </div>
      </div>

      <div id="badges-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
  </div>
</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-fit">
  <div class="flex items-center gap-4 px-6 py-4 glass-morph shadow-2xl overflow-x-auto no-scrollbar scroll-smooth">
    <button onclick="window.location.href='userdashboard.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Home">🏠</button>
    <button onclick="window.location.href='mood.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Mood">😃</button>
    <button onclick="window.location.href='journal.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Journal">✍️</button>
    <button onclick="window.location.href='meditation.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Meditation">🧘</button>
    <button onclick="window.location.href='dailychallenges.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Daily Challenges">🎯</button>
    <button onclick="window.location.href='badge.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Achievements">🎖️</button>
    <button onclick="window.location.href='timecapsule.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Time Capsule">⏳</button>
    <button onclick="window.location.href='riskengine.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Risk Engine">🧠</button>
    <button onclick="window.location.href='profile.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Profile">👤</button>
    <button onclick="window.location.href='settings.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Settings">⚙️</button>
  </div>
</nav>

<script>
  const API_URL = "http://localhost:8080/api/badges";
  const AUTH_TOKEN = localStorage.getItem('token');

  const BADGE_CATALOG = [
    { type: "FIRST_MOOD", title: "First Mood Logged", desc: "You logged your first mood.", icon: "🌸", rarity: "Common" },
    { type: "MOOD_STREAK_7", title: "7-Day Mood Streak", desc: "You logged moods for 7 consecutive days.", icon: "🔥", rarity: "Rare" },
    { type: "FIRST_MEDITATION", title: "First Meditation", desc: "You completed your first meditation session.", icon: "🧘", rarity: "Common" },
    { type: "MEDITATION_60_MIN_WEEK", title: "60 Minute Week", desc: "You meditated for 60 minutes in a week.", icon: "✨", rarity: "Rare" },
    { type: "FIRST_JOURNAL", title: "First Journal", desc: "You wrote your first journal entry.", icon: "✍️", rarity: "Common" },
    { type: "JOURNAL_STREAK_7", title: "7-Day Journal Streak", desc: "You wrote journals for 7 consecutive days.", icon: "📓", rarity: "Rare" },
    { type: "FIRST_CHALLENGE_COMPLETED", title: "First Challenge Completed", desc: "You completed your first daily challenge.", icon: "🎯", rarity: "Common" },
    { type: "CHALLENGE_STREAK_7", title: "7-Day Challenge Streak", desc: "You completed daily challenges for 7 consecutive days.", icon: "🏆", rarity: "Epic" }
  ];

  let earnedBadges = [];

  function authHeaders() {
    return { Authorization: `Bearer ${AUTH_TOKEN}` };
  }

  function initTheme() {
    const stored = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (stored === 'dark' || (!stored && prefersDark)) {
      document.documentElement.classList.add('dark');
      $('#theme-icon').text('☀️');
    } else {
      $('#theme-icon').text('🌙');
    }
  }

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    $('#theme-icon').text(isDark ? '☀️' : '🌙');
  }

  function ensureAuth() {
    if (!AUTH_TOKEN) {
      window.location.href = "sign-in.html";
      return false;
    }
    return true;
  }

  function escapeHtml(str) {
    return String(str ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
  }

  function loadBadges() {
    $.ajax({
      url: API_URL,
      headers: authHeaders(),
      success: (res) => {
        earnedBadges = res.data || [];
        renderBadges();
      },
      error: (xhr) => {
        if (xhr.status === 401) {
          localStorage.removeItem('token');
          window.location.href = "sign-in.html";
        }
      }
    });
  }

  function renderBadges() {
    const earnedTypes = new Map(earnedBadges.map(b => [b.badgeType, b]));
    const container = $('#badges-container');
    container.empty();

    let earnedCount = 0;

    BADGE_CATALOG.forEach(badge => {
      const earned = earnedTypes.has(badge.type);
      if (earned) earnedCount++;

      const earnedData = earnedTypes.get(badge.type);
      const ringColor = earned
              ? (badge.rarity === 'Epic' ? 'ring-purple-400 bg-purple-50 dark:bg-purple-900/20' :
                      badge.rarity === 'Rare' ? 'ring-emerald-400 bg-emerald-50 dark:bg-emerald-900/20' :
                              'ring-emerald-400 bg-emerald-50 dark:bg-emerald-900/20')
              : 'ring-slate-200 dark:ring-slate-700 bg-slate-50 dark:bg-slate-800';

      const footer = earned
              ? `<p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mt-4">Earned: ${escapeHtml(earnedData.awardedDate || '')}</p>`
              : `<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4">Locked</p>`;

      const card = `
        <div class="badge-card ${earned ? '' : 'badge-locked'} bg-white/50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700/50 rounded-3xl p-6 flex flex-col items-center text-center relative overflow-hidden group">
          <div class="badge-icon-wrap w-20 h-20 rounded-full ring-4 ${ringColor} flex items-center justify-center text-4xl mb-4 transition-transform duration-300 group-hover:scale-110">
            ${badge.icon}
          </div>

          <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${badge.rarity}</span>
          <h3 class="font-bold text-lg dark:text-white leading-tight mb-2">${escapeHtml(badge.title)}</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 flex-grow">${escapeHtml(badge.desc)}</p>

          ${footer}
        </div>
      `;
      container.append(card);
    });

    const level = Math.max(1, Math.floor(earnedCount / 2) + 1);
    const points = earnedBadges.length * 50;
    const next = Math.max(0, 1000 - points);
    const progress = Math.min(100, (points / 1000) * 100);

    $('#level-number').text(level);
    $('#earned-points').text(points);
    $('#points-to-next').text(`${next} AP`);
    $('#level-bar').css('width', `${progress}%`);
  }

  $(document).ready(() => {
    if (!ensureAuth()) return;
    initTheme();
    loadBadges();
  });
</script>
</body>
</html>
