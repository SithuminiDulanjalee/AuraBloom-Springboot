<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBloom | Zen Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; transition: background 0.5s ease; }
        .dark body { background: #020617; }
        .aura-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.1), transparent 50%); z-index: -1; pointer-events: none; }
        .glass-morph { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 2rem; }
        .dark .glass-morph { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-glow { box-shadow: 0 0 30px rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 overflow-x-hidden pb-32">
<div class="aura-bg"></div>

<div class="max-w-[1600px] mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center gap-4">
            <div class="w-24 h-24 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-lg mb-8">
                <span class="text-5xl animate-pulse">🧘</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter dark:text-white">AuraBloom <span class="text-purple-500">Zen</span></h1>
        </div>
        <div class="flex items-center gap-3 glass-morph p-2 pr-6">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm transition hover:scale-110">
                <span id="theme-icon">🌙</span>
            </button>
            <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Focus Status</p>
                <p class="text-sm font-extrabold text-purple-500">Deep Calm</p>
            </div>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-xl ml-4" alt="User Profile">
        </div>
    </header>

    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-12 lg:col-span-4 space-y-6">
            <div class="glass-morph p-8 active-glow">
                <h2 class="text-2xl font-black mb-6 dark:text-white">Log Session</h2>
                <input type="hidden" id="session-id">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Technique / Title</label>
                        <input type="text" id="session-title" placeholder="e.g. Mindful Breath" class="w-full mt-1 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-purple-400 transition">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Duration (Min)</label>
                            <input type="number" id="session-duration" placeholder="10" class="w-full mt-1 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-purple-400 transition">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Date</label>
                            <input type="date" id="session-date" class="w-full mt-1 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-purple-400 transition">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Reflection Notes</label>
                        <textarea id="session-notes" placeholder="How did you feel?" class="w-full mt-1 p-4 h-24 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-purple-400 transition"></textarea>
                    </div>
                    <div id="btn-group" class="pt-4 flex gap-3">
                        <button onclick="saveSession()" id="btn-save" class="flex-1 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl font-black shadow-xl hover:scale-105 transition">Save Session</button>
                        <button onclick="clearForm()" class="px-6 py-4 bg-slate-200 dark:bg-slate-800 rounded-2xl transition hover:bg-slate-300 dark:hover:bg-slate-700">🔄</button>
                    </div>
                    <div id="edit-actions" class="hidden pt-4 flex gap-3">
                        <button onclick="updateSession()" class="flex-1 py-4 bg-purple-600 text-white rounded-2xl font-black shadow-xl hover:scale-105 transition">Update</button>
                        <button onclick="deleteSession()" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black shadow-xl hover:scale-105 transition">Delete</button>
                    </div>
                </div>
            </div>

            <div class="glass-morph p-8 border-l-8 border-purple-500 bg-gradient-to-br from-purple-50 to-white dark:from-slate-900/50 dark:to-slate-900">
                <h3 class="font-bold text-slate-500 text-xs uppercase tracking-widest">Weekly Commitment</h3>
                <div class="flex items-baseline gap-2 mt-4">
                    <span id="weekly-total" class="text-5xl font-black text-purple-600 dark:text-purple-400">0</span>
                    <span class="text-slate-400 font-bold">MINUTES</span>
                </div>
                <p class="text-xs text-slate-400 mt-4 leading-relaxed italic">"Quiet the mind, and the soul will speak."</p>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-8">
            <div class="glass-morph p-8 min-h-[600px]">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black dark:text-white leading-tight">Your Zen Journey</h2>
                    <span class="px-4 py-1 bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400 rounded-full text-[10px] font-bold uppercase tracking-widest">Past Sessions</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                        <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 dark:border-slate-800">
                            <th class="pb-4">Session</th>
                            <th class="pb-4">Duration</th>
                            <th class="pb-4">Date</th>
                            <th class="pb-4 text-right">Reflection</th>
                        </tr>
                        </thead>
                        <tbody id="session-table-body" class="divide-y divide-slate-50 dark:divide-slate-800/50">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-fit">
    <div class="flex items-center gap-4 px-6 py-4 glass-morph shadow-2xl overflow-x-auto no-scrollbar scroll-smooth">
        <button onclick="window.location.href='new.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all" title="Home">🏠</button>
        <button onclick="window.location.href='journal.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all" title="Journal">✍️</button>
        <button onclick="window.location.href='meditation.html'" class="text-2xl scale-125 transition-transform" title="Meditation">🧘</button>
        <button onclick="window.location.href='profile.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all" title="Profile">👤</button>
        <button onclick="window.location.href='stats.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all" title="Stats">📈</button>
        <button onclick="window.location.href='settings.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all" title="Settings">⚙️</button>
    </div>
</nav>

<script>
    const API_URL = "http://localhost:8080/api/meditations";
    const AUTH_TOKEN = localStorage.getItem('token');

    $(document).ready(() => {
        if (!AUTH_TOKEN) window.location.href = "sign-in.html";
        loadSessions();
        loadWeeklyTotal();
        // Set default date to today
        $('#session-date').val(new Date().toISOString().split('T')[0]);
    });

    function loadSessions() {
        $.ajax({
            url: API_URL,
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            success: (response) => {
                const rows = response.data.map(session => `
                    <tr onclick="prepareUpdate(${session.id}, '${session.title}', ${session.duration}, '${session.sessionDate}', '${session.notes}')"
                        class="group cursor-pointer hover:bg-purple-50/50 dark:hover:bg-purple-900/10 transition">
                        <td class="py-5">
                            <p class="font-bold dark:text-white group-hover:text-purple-600 transition">${session.title}</p>
                        </td>
                        <td class="py-5">
                            <span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-lg text-xs font-bold dark:text-slate-300">${session.duration}m</span>
                        </td>
                        <td class="py-5 text-sm text-slate-400 font-medium">${session.sessionDate}</td>
                        <td class="py-5 text-right">
                            <p class="text-xs text-slate-400 italic truncate max-w-[150px] ml-auto">${session.notes || 'No notes'}</p>
                        </td>
                    </tr>
                `).join('');
                $('#session-table-body').html(rows || '<tr><td colspan="4" class="py-10 text-center text-slate-400">No sessions recorded yet. Start your journey!</td></tr>');
            }
        });
    }

    function loadWeeklyTotal() {
        $.ajax({
            url: `${API_URL}/weekly-total`,
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            success: (res) => $('#weekly-total').text(res.data)
        });
    }

    function saveSession() {
        const data = {
            title: $('#session-title').val(),
            duration: parseInt($('#session-duration').val()),
            sessionDate: $('#session-date').val(),
            notes: $('#session-notes').val()
        };

        if(!data.title || !data.duration) return alert("Title and Duration are required!");

        $.ajax({
            url: API_URL,
            method: 'POST',
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: () => {
                loadSessions();
                loadWeeklyTotal();
                clearForm();
            }
        });
    }

    function prepareUpdate(id, title, duration, date, notes) {
        $('#session-id').val(id);
        $('#session-title').val(title);
        $('#session-duration').val(duration);
        $('#session-date').val(date);
        $('#session-notes').val(notes === 'null' ? '' : notes);

        $('#btn-group').addClass('hidden');
        $('#edit-actions').removeClass('hidden');
    }

    function updateSession() {
        const id = $('#session-id').val();
        const data = {
            title: $('#session-title').val(),
            duration: parseInt($('#session-duration').val()),
            sessionDate: $('#session-date').val(),
            notes: $('#session-notes').val()
        };

        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: () => {
                loadSessions();
                loadWeeklyTotal();
                clearForm();
            }
        });
    }

    function deleteSession() {
        const id = $('#session-id').val();
        if(!confirm("Are you sure you want to delete this session?")) return;

        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            success: () => {
                loadSessions();
                loadWeeklyTotal();
                clearForm();
            }
        });
    }

    function clearForm() {
        $('#session-id').val('');
        $('#session-title').val('');
        $('#session-duration').val('');
        $('#session-date').val(new Date().toISOString().split('T')[0]);
        $('#session-notes').val('');
        $('#btn-group').removeClass('hidden');
        $('#edit-actions').addClass('hidden');
    }

    function toggleTheme() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        $('#theme-icon').text(isDark ? '☀️' : '🌙');
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        $('#theme-icon').text('☀️');
    }
</script>
</body>
</html>
