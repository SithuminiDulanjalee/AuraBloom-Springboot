<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBloom | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Quicksand', sans-serif; transition: background 0.3s ease; }
        .aura-bg {
            background: linear-gradient(135deg, #E0F2FE, #F0FDF4, #FDF2F8);
            filter: blur(80px);
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            animation: float 15s infinite alternate;
        }
        .dark .aura-bg { background: linear-gradient(135deg, #1e293b, #0f172a, #1e1b4b); }
        @keyframes float {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center min-h-screen p-4 overflow-x-hidden">

<div class="aura-bg"></div>

<a href="../index.html" class="fixed top-6 left-6 p-3 rounded-full glass-panel shadow-lg z-50 hover:scale-110 transition-transform group flex items-center gap-2 pr-5">
    <span class="text-xl">←</span>
    <span class="text-sm font-bold text-slate-700 dark:text-slate-200 opacity-0 group-hover:opacity-100 transition-opacity">Back</span>
</a>

<button onclick="toggleTheme()" class="fixed top-6 right-6 p-3 rounded-full glass-panel shadow-lg z-50 hover:scale-110 transition-transform">
    <span id="theme-icon" class="text-xl">🌙</span>
</button>

<div class="w-full max-w-5xl flex flex-col md:flex-row glass-panel rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-2xl transition-all duration-500">

    <div class="hidden md:flex md:w-1/2 bg-white/20 dark:bg-white/5 flex-col items-center justify-center p-12 text-center border-r border-white/40">
        <div class="w-24 h-24 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-lg mb-8">
            <span class="text-5xl animate-bounce">🌸</span>
        </div>
        <h1 class="text-4xl font-bold text-slate-800 dark:text-white mb-4">AuraBloom</h1>
        <p class="text-slate-600 dark:text-slate-300 italic text-lg">"Where Your Inner Energy Blossoms."</p>
    </div>

    <div class="w-full md:w-1/2 p-8 sm:p-12 md:p-16 flex flex-col justify-center">
        <div class="md:hidden flex flex-col items-center mb-8">
            <span class="text-5xl mb-2">🌸</span>
            <h1 class="text-3xl font-bold text-slate-800 dark:text-white">AuraBloom</h1>
        </div>

        <h2 class="text-3xl font-bold text-slate-800 dark:text-white mb-2">Welcome Back</h2>
        <p class="text-slate-500 dark:text-slate-400 mb-8">Continue your path to mindfulness.</p>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-1">Email</label>
                <input id="email" type="email" placeholder="name@email.com" required
                       class="w-full px-5 py-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 dark:text-white focus:ring-2 focus:ring-gold focus:border-gold outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-1">Password</label>
                <input id="password" type="password" placeholder="••••••••" required
                       class="w-full px-5 py-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 dark:text-white focus:ring-2 focus:ring-gold focus:border-gold outline-none transition-all">
            </div>

            <button type="submit"
                    class="w-full bg-slate-900 dark:bg-slate-100 dark:text-slate-900 text-white py-4 rounded-2xl font-bold hover:opacity-90 active:scale-95 transition shadow-lg">
                Sign In
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-slate-500 dark:text-slate-400">
            New to the garden?
            <a href="sign-up.html" class="text-emerald-600 dark:text-emerald-400 font-bold hover:underline">Create an Account</a>
        </p>
    </div>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');

        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            icon.innerText = '🌙';
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.add('dark');
            icon.innerText = '☀️';
            localStorage.setItem('theme', 'dark');
        }
    }

    $(document).ready(function () {
        if (
            localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') &&
                window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
            document.documentElement.classList.add('dark');
            $('#theme-icon').text('☀️');
        }
    });

    $("#loginForm").on("submit", function (e) {
        e.preventDefault();

        const email = $("#email").val().trim();
        const password = $("#password").val().trim();

        if (!email || !password) {
            alert("Please enter email and password!");
            return;
        }

        $.ajax({
            url: "http://localhost:8080/api/auth/login",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({
                email: email,
                password: password
            }),
                success: function (res) {
                    if (res.code === 200) {
                        localStorage.setItem("token", res.data.token);
                        localStorage.setItem("userEmail", res.data.email);
                        localStorage.setItem("username", res.data.username);
                        localStorage.setItem("role", res.data.role);

                        if (res.data.role === "ADMIN") {
                            window.location.href = "admindashboard.html";
                        } else {
                            window.location.href = "userdashboard.html";
                        }
                    } else {
                        alert(res.message || "Login failed!");
                    }
                },
            error: function (xhr) {
                if (xhr.status === 401) {
                    alert("Invalid email or password!");
                } else if (xhr.status === 404) {
                    alert("User not found!");
                } else {
                    alert("Something went wrong!");
                }
                console.error(xhr.responseText);
            }
        });
    });
</script>
</body>
</html>
