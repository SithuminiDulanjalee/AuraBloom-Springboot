    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            transition: background 0.5s ease;
        }
        .dark body { background: #020617; }

        /* The Moving Aura Background */
        .aura-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(96, 165, 250, 0.1), transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* Glassmorphism Morphing Card */
        .glass-morph {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .glass-morph {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsive Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .sidebar-fixed { display: none; }
        }
        .active-glow {
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
            border-color: rgba(96, 165, 250, 0.6);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none; scrollbar-width: none;
        }
    </style>
</head>

<script>
    const AUTH_TOKEN = localStorage.getItem('token');

    if (!AUTH_TOKEN) {
        alert("Please login first!");
        window.location.href = "sign-in.html";
    }
    function toggleTheme() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        $('#theme-icon').text(isDark ? '☀️' : '🌙');
    }

    // Initialize Theme
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        $('#theme-icon').text('☀️');
    }

    // Uncommon Interaction: Aura Background Color Shift
    function updateAura(color) {
        $('#aura').css('background', `radial-gradient(circle at 50% 50%, ${color}33, transparent 90%)`);
        // Feedback to the user
        $('.mood-btn').removeClass('active-glow');
        $(event.currentTarget).addClass('active-glow');
    }

    function nextFlow() {
        // Optional: Add a fade-out effect before leaving
        $('.dashboard-grid').fadeOut(300, function() {
            window.location.href = 'mood.html';
        });
    }
    async function loadUser() {
        const res = await fetch("http://localhost:8080/api/users/profile", {
            headers: { Authorization: `Bearer ${AUTH_TOKEN}` }
        });

        const data = await res.json();

        if (data.code === 200) {
            document.getElementById("user-span").innerText = data.data.username;
        }
    }

    loadUser();
</script>
