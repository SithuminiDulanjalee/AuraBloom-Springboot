<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBloom | Soul Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; transition: background 0.5s ease; }
        .dark body { background: #020617; }
        .aura-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(244, 114, 182, 0.1), transparent 50%); z-index: -1; pointer-events: none; }
        .glass-morph { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 2rem; }
        .dark .glass-morph { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-glow { box-shadow: 0 0 30px rgba(244, 114, 182, 0.2); border-color: rgba(244, 114, 182, 0.4); }
        .mood-chip-active { border-color: #f472b6 !important; background: rgba(244, 114, 182, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 overflow-x-hidden pb-32">
<div class="aura-bg"></div>

<div class="max-w-[1600px] mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center gap-4">
            <div class="w-24 h-24 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-lg mb-8">
                <span class="text-5xl animate-bounce">✍️</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter dark:text-white">AuraBloom <span class="text-pink-500">Journal</span></h1>
        </div>
        <div class="flex items-center gap-3 glass-morph p-2 pr-6">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm transition hover:scale-110">
                <span id="theme-icon">🌙</span>
            </button>
            <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Vibe Check</p>
                <p class="text-sm font-extrabold text-pink-500">Expressive</p>
            </div>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-xl ml-4" alt="User Profile">
        </div>
    </header>

    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-12 lg:col-span-5 space-y-6">
            <div class="glass-morph p-8 active-glow">
                <h2 class="text-2xl font-black mb-6 dark:text-white">New Entry</h2>
                <input type="hidden" id="entry-id">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Headline</label>
                        <input type="text" id="entry-title" placeholder="What's on your mind?" class="w-full mt-1 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-pink-400 transition">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Current Mood</label>
                        <div class="flex flex-wrap gap-2 mt-2" id="mood-selector">
                            <button onclick="setMood('HAPPY')" class="mood-btn px-4 py-2 rounded-xl border-2 border-transparent bg-white/50 dark:bg-slate-900/50 text-xs font-bold dark:text-white transition" data-mood="HAPPY">😊 Happy</button>
                            <button onclick="setMood('CALM')" class="mood-btn px-4 py-2 rounded-xl border-2 border-transparent bg-white/50 dark:bg-slate-900/50 text-xs font-bold dark:text-white transition" data-mood="CALM">🌊 Calm</button>
                            <button onclick="setMood('STRESSED')" class="mood-btn px-4 py-2 rounded-xl border-2 border-transparent bg-white/50 dark:bg-slate-900/50 text-xs font-bold dark:text-white transition" data-mood="STRESSED">⚡ Stressed</button>
                            <button onclick="setMood('ANXIOUS')" class="mood-btn px-4 py-2 rounded-xl border-2 border-transparent bg-white/50 dark:bg-slate-900/50 text-xs font-bold dark:text-white transition" data-mood="ANXIOUS">🌪️ Anxious</button>
                            <button onclick="setMood('SAD')" class="mood-btn px-4 py-2 rounded-xl border-2 border-transparent bg-white/50 dark:bg-slate-900/50 text-xs font-bold dark:text-white transition" data-mood="SAD">☁️ Sad</button>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Deep Thoughts</label>
                        <textarea id="entry-content" placeholder="Pour your heart out..." class="w-full mt-1 p-4 h-48 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-pink-400 transition"></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tags (comma separated)</label>
                        <input type="text" id="entry-tags" placeholder="healing, growth, focus" class="w-full mt-1 p-4 rounded-2xl bg-white/50 dark:bg-slate-900/50 dark:text-white outline-none ring-2 ring-transparent focus:ring-pink-400 transition">
                    </div>

                    <div id="action-buttons" class="pt-4 flex gap-3">
                        <button onclick="saveEntry()" id="btn-save" class="flex-1 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl font-black shadow-xl hover:scale-105 transition">Lock Entry</button>
                        <button onclick="resetForm()" class="px-6 py-4 bg-slate-200 dark:bg-slate-800 rounded-2xl transition hover:bg-slate-300 dark:hover:bg-slate-700">🔄</button>
                    </div>
                </div>
            </div>

            <div id="weekly-summary" class="glass-morph p-8 bg-gradient-to-br from-pink-50 to-white dark:from-slate-900/50 dark:to-slate-900">
                <h3 class="font-bold text-slate-500 text-xs uppercase tracking-widest">7-Day Reflection</h3>
                <div class="flex items-center justify-between mt-4">
                    <p class="text-4xl font-black dark:text-white" id="stat-total-entries">0</p>
                    <span class="text-[10px] font-bold text-pink-500 uppercase">Entries this week</span>
                </div>
                <div class="mt-6 grid grid-cols-5 gap-2 text-center" id="stat-mood-breakdown">
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-7 space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black dark:text-white">Your Timeline</h2>
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-pink-400 animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Secure & Encrypted</span>
                </div>
            </div>

            <div id="journal-feed" class="space-y-6 max-h-[1000px] overflow-y-auto no-scrollbar pr-2">
            </div>
        </div>
    </div>
</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-fit">
    <div class="flex items-center gap-4 px-6 py-4 glass-morph shadow-2xl overflow-x-auto no-scrollbar scroll-smooth">
        <button onclick="window.location.href='new.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all">🏠</button>
        <button onclick="window.location.href='journal.html'" class="text-2xl scale-125 transition-transform">✍️</button>
        <button onclick="window.location.href='meditation.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all">🧘</button>
        <button onclick="window.location.href='profile.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all">👤</button>
        <button onclick="window.location.href='stats.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all">📈</button>
        <button onclick="window.location.href='settings.html'" class="text-2xl opacity-50 hover:opacity-100 transition-all">⚙️</button>
    </div>
</nav>

<script>
    const API_URL = "http://localhost:8080/api/journals";
    const AUTH_TOKEN = localStorage.getItem('token');
    let selectedMood = "HAPPY";

    $(document).ready(() => {
        if (!AUTH_TOKEN) window.location.href = "sign-in.html";
        loadEntries();
        loadSummary();
        setMood('HAPPY'); // Default
    });

    function loadEntries() {
        $.ajax({
            url: API_URL,
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            success: (res) => {
                const feed = res.data.map(entry => `
                    <div class="glass-morph p-8 group hover:active-glow transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${entry.createdDate}</span>
                                <h3 class="text-xl font-black dark:text-white mt-1">${entry.title}</h3>
                            </div>
                            <span class="px-3 py-1 bg-pink-100 dark:bg-pink-900/30 text-pink-500 rounded-lg text-[10px] font-bold uppercase">${entry.mood}</span>
                        </div>
                        <p class="text-slate-500 dark:text-slate-400 leading-relaxed mb-6">${entry.content}</p>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-2">
                                ${entry.tags.map(t => `<span class="text-[10px] font-bold text-slate-400">#${t}</span>`).join('')}
                            </div>
                            <div class="flex gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="editEntry(${entry.id}, '${entry.title}', \`${entry.content.replace(/'/g, "\\'")}\`, '${entry.mood}', '${entry.tags.join(',')}')" class="text-xs font-bold text-blue-500 uppercase">Edit</button>
                                <button onclick="deleteEntry(${entry.id})" class="text-xs font-bold text-rose-500 uppercase">Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                $('#journal-feed').html(feed || '<div class="text-center py-20 text-slate-400 italic">No entries yet. Start writing...</div>');
            }
        });
    }

    function loadSummary() {
        $.ajax({
            url: `${API_URL}/weekly-summary`,
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            success: (res) => {
                const summary = res.data;
                $('#stat-total-entries').text(summary.totalEntries);

                const breakdown = Object.entries(summary.moodCounts).map(([mood, count]) => `
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${mood.substring(0,3)}</p>
                        <p class="font-black dark:text-white">${count}</p>
                    </div>
                `).join('');
                $('#stat-mood-breakdown').html(breakdown);
            }
        });
    }

    function setMood(mood) {
        selectedMood = mood;
        $('.mood-btn').removeClass('mood-chip-active');
        $(`.mood-btn[data-mood="${mood}"]`).addClass('mood-chip-active');
    }

    function saveEntry() {
        const id = $('#entry-id').val();
        const data = {
            title: $('#entry-title').val(),
            content: $('#entry-content').val(),
            mood: selectedMood,
            tags: $('#entry-tags').val().split(',').map(t => t.trim()).filter(t => t !== "")
        };

        if(!data.title || !data.content) return alert("Please fill title and content");

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        $.ajax({
            url: url,
            method: method,
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: () => {
                resetForm();
                loadEntries();
                loadSummary();
            }
        });
    }

    function editEntry(id, title, content, mood, tags) {
        $('#entry-id').val(id);
        $('#entry-title').val(title);
        $('#entry-content').val(content);
        $('#entry-tags').val(tags);
        setMood(mood);
        $('#btn-save').text("Update Entry");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteEntry(id) {
        if(!confirm("Are you sure you want to delete this memory?")) return;
        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` },
            success: () => {
                loadEntries();
                loadSummary();
            }
        });
    }

    function resetForm() {
        $('#entry-id').val('');
        $('#entry-title').val('');
        $('#entry-content').val('');
        $('#entry-tags').val('');
        $('#btn-save').text("Lock Entry");
        setMood('HAPPY');
    }

    function toggleTheme() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        $('#theme-icon').text(isDark ? '☀️' : '🌙');
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        $('#theme-icon').text('☀️');
    }
</script>
</body>
</html>
