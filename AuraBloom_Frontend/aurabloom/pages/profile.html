<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraBloom | Account Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; transition: background 0.5s ease; }
    .dark body { background: #020617; }
    .aura-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.12), transparent 50%); z-index: -1; pointer-events: none; }
    .glass-morph { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 2rem; }
    .dark .glass-morph { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
    .input-glass { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 1rem; transition: all 0.3s ease; }
    .dark .input-glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
    .input-glass:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .active-glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.3); }
    .strength-bar { height: 6px; border-radius: 3px; transition: all 0.5s ease; }
  </style>
</head>
<body class="p-4 md:p-8 lg:p-12 overflow-x-hidden pb-32">
<div class="aura-bg"></div>

<div class="max-w-[1400px] mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
    <div class="flex items-center gap-4">
      <div class="w-20 h-20 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-lg mb-4">
        <span class="text-4xl">🔐</span>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tighter dark:text-white">AuraBloom <span class="text-indigo-500">Identity</span></h1>
    </div>
    <div class="flex items-center gap-3 glass-morph p-2 pr-6">
      <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm transition hover:scale-110">
        <span id="theme-icon">🌙</span>
      </button>
      <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
      <div class="text-right">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Security</p>
        <p class="text-sm font-extrabold text-indigo-500">Verified User</p>
      </div>
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-xl ml-4" alt="User Profile">
    </div>
  </header>

  <div class="grid grid-cols-12 gap-8">

    <div class="col-span-12 lg:col-span-4 space-y-6">
      <div class="glass-morph p-8 text-center relative overflow-hidden group">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

        <div class="relative w-32 h-32 mx-auto mb-6">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aura" alt="Avatar" class="rounded-full bg-indigo-50 border-4 border-white dark:border-slate-700 shadow-xl">
        </div>

        <h2 class="text-2xl font-black dark:text-white" id="display-username">Loading...</h2>
        <p class="text-sm text-slate-500 font-medium mb-6" id="display-email">Loading...</p>

        <div class="p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl border border-indigo-100 dark:border-indigo-800/50">
          <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2">Aura Rank</p>
          <p class="text-lg font-black text-indigo-600 dark:text-indigo-400">Master Bloom</p>
        </div>
      </div>

      <div class="glass-morph p-6 active-glow">
        <h3 class="text-xs font-black dark:text-white uppercase tracking-widest mb-4">Security Overview</h3>
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <span class="text-sm font-bold text-slate-500">2FA Status</span>
            <span class="text-[10px] font-bold px-2 py-1 bg-emerald-100 text-emerald-600 rounded-md">ENABLED</span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-sm font-bold text-slate-500">Last Password Change</span>
            <span class="text-xs font-bold dark:text-slate-300">Managed by backend</span>
          </div>
        </div>
      </div>
    </div>

    <div class="col-span-12 lg:col-span-8 space-y-8">
      <div class="glass-morph p-8">
        <h2 class="text-xl font-black dark:text-white mb-8">Personal Information</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Username</label>
            <div class="flex gap-2">
              <input type="text" id="input-username" class="input-glass p-4 w-full text-sm font-bold" placeholder="Username">
              <button onclick="saveProfile(this)" class="px-6 py-4 bg-indigo-500 text-white font-black text-xs rounded-2xl hover:bg-indigo-600 transition shadow-lg shadow-indigo-500/20">Update</button>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
            <div class="flex gap-2">
              <input type="email" id="input-email" class="input-glass p-4 w-full text-sm font-bold" placeholder="Email">
              <button onclick="saveProfile(this)" class="px-6 py-4 bg-indigo-500 text-white font-black text-xs rounded-2xl hover:bg-indigo-600 transition shadow-lg shadow-indigo-500/20">Update</button>
            </div>
          </div>
        </div>
      </div>

      <div class="glass-morph p-8">
        <h2 class="text-xl font-black dark:text-white mb-8">Security & Password</h2>

        <form id="password-form" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Current Password</label>
              <input type="password" id="current-password" class="input-glass p-4 w-full text-sm font-bold" placeholder="••••••••">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">New Password</label>
              <input type="password" id="new-password" class="input-glass p-4 w-full text-sm font-bold" placeholder="Min 4 characters">
              <div class="flex gap-1 px-1 mt-2">
                <div class="strength-bar flex-1 bg-slate-200 dark:bg-slate-700" id="sb-1"></div>
                <div class="strength-bar flex-1 bg-slate-200 dark:bg-slate-700" id="sb-2"></div>
                <div class="strength-bar flex-1 bg-slate-200 dark:bg-slate-700" id="sb-3"></div>
              </div>
            </div>
          </div>

          <div class="flex justify-end">
            <button type="submit" class="px-10 py-4 bg-gradient-to-r from-violet-500 to-indigo-600 text-white font-black text-sm rounded-2xl hover:scale-105 transition-all shadow-xl shadow-indigo-500/30">
              Save Password Changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-fit">
  <div class="flex items-center gap-4 px-6 py-4 glass-morph shadow-2xl overflow-x-auto no-scrollbar scroll-smooth">
    <button onclick="window.location.href='userdashboard.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Home">🏠</button>
    <button onclick="window.location.href='mood.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Mood">😃</button>
    <button onclick="window.location.href='journal.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Journal">✍️</button>
    <button onclick="window.location.href='meditation.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Meditation">🧘</button>
    <button onclick="window.location.href='dailychallenges.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Daily Challenges">🎯</button>
    <button onclick="window.location.href='badge.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Achievements">🎖️</button>
    <button onclick="window.location.href='timecapsule.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Time Capsule">⏳</button>
    <button onclick="window.location.href='riskengine.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Risk Engine">🧠</button>
    <button onclick="window.location.href='profile.html'" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Profile">👤</button>
    <button onclick="logout()" class="text-2xl hover:scale-125 transition-transform flex-shrink-0" title="Logout">🚪</button>
  </div>
</nav>

<script>
  const API_BASE = "http://localhost:8080/api/users";
  let AUTH_TOKEN = localStorage.getItem("token");

  $(document).ready(() => {
    if (!AUTH_TOKEN) {
      window.location.href = "sign-in.html";
      return;
    }

    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      $('#theme-icon').text('☀️');
    }

    loadProfile();

    $('#new-password').on('input', function () {
      updateStrengthBar($(this).val());
    });

    $('#password-form').on('submit', function (e) {
      e.preventDefault();
      changePassword();
    });
  });

  function authHeaders() {
    return { Authorization: `Bearer ${AUTH_TOKEN}` };
  }

  function loadProfile() {
    $.ajax({
      url: `${API_BASE}/profile`,
      method: "GET",
      headers: authHeaders(),
      success: function (res) {
        const user = res.data;

        $('#display-username').text(user.username || '');
        $('#display-email').text(user.email || '');

        $('#input-username').val(user.username || '');
        $('#input-email').val(user.email || '');

        localStorage.setItem("username", user.username || '');
        localStorage.setItem("userEmail", user.email || '');
      },
      error: function (xhr) {
        if (xhr.status === 401) {
          localStorage.removeItem("token");
          window.location.href = "sign-in.html";
        } else {
          alert(xhr.responseJSON?.message || "Failed to load profile");
        }
      }
    });
  }

  function saveProfile(btn) {
    const payload = {
      username: $('#input-username').val().trim(),
      email: $('#input-email').val().trim()
    };

    $.ajax({
      url: `${API_BASE}/profile`,
      method: "PUT",
      contentType: "application/json",
      headers: authHeaders(),
      data: JSON.stringify(payload),
      success: function (res) {
        const result = res.data;

        if (result?.token) {
          AUTH_TOKEN = result.token;
          localStorage.setItem("token", result.token);
        }

        if (result?.user) {
          $('#display-username').text(result.user.username || '');
          $('#display-email').text(result.user.email || '');
          $('#input-username').val(result.user.username || '');
          $('#input-email').val(result.user.email || '');

          localStorage.setItem("username", result.user.username || '');
          localStorage.setItem("userEmail", result.user.email || '');
        }

        if (btn) {
          const original = $(btn).text();
          $(btn).text("Updated");
          setTimeout(() => $(btn).text(original), 1200);
        }

        alert("Profile updated successfully");
      },
      error: function (xhr) {
        alert(xhr.responseJSON?.message || "Failed to update profile");
      }
    });
  }

  function changePassword() {
    const payload = {
      currentPassword: $('#current-password').val(),
      newPassword: $('#new-password').val()
    };

    $.ajax({
      url: `${API_BASE}/profile/password`,
      method: "PUT",
      contentType: "application/json",
      headers: authHeaders(),
      data: JSON.stringify(payload),
      success: function (res) {
        const result = res.data;

        if (result?.token) {
          AUTH_TOKEN = result.token;
          localStorage.setItem("token", result.token);
        }

        $('#current-password').val('');
        $('#new-password').val('');
        updateStrengthBar('');

        alert("Password updated successfully");
      },
      error: function (xhr) {
        alert(xhr.responseJSON?.message || "Failed to update password");
      }
    });
  }

  function updateStrengthBar(pass) {
    const bars = [$('#sb-1'), $('#sb-2'), $('#sb-3')];
    bars.forEach(b => b.removeClass('bg-rose-400 bg-amber-400 bg-emerald-400').addClass('bg-slate-200 dark:bg-slate-700'));

    if (pass.length > 0 && pass.length < 5) {
      bars[0].addClass('bg-rose-400');
    } else if (pass.length >= 5 && pass.length < 10) {
      bars[0].addClass('bg-amber-400');
      bars[1].addClass('bg-amber-400');
    } else if (pass.length >= 10) {
      bars[0].addClass('bg-emerald-400');
      bars[1].addClass('bg-emerald-400');
      bars[2].addClass('bg-emerald-400');
    }
  }

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    $('#theme-icon').text(isDark ? '☀️' : '🌙');
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("role");

    alert("Logged out successfully!");
    window.location.href = "sign-in.html";
  }
</script>
</body>
</html>
